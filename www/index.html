<!DOCTYPE html>
<html lang="en">

<head>
    <title>Rock Paper Scissors</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta description="Play Rock Paper Scissors with a computer using the magic of computer vision">

    <link rel="stylesheet" type="text/css" href="styles/styles.css">

<body>
        <script>
            // Check if device is a mobile device
            if (
                navigator.userAgent.match(/Android/i) ||
                navigator.userAgent.match(/webOS/i) ||
                navigator.userAgent.match(/iPhone/i) ||
                navigator.userAgent.match(/iPod/i)
            ) {
                location.replace("mobile.html");
            }
        </script>
            
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <a class="navbar-brand" href="https://rock-paper-scissor-cv.netlify.app/">  
                <label class="h3 m-0">Rock Paper Scissors</label>
            </a>
        
            <button class="navbar-toggler navbar-dark" type="button" data-toggle="collapse"
                data-target="#navbar-collapse-button" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        
            <div class="collapse navbar-collapse" id="navbar-collapse-button">
                <div class="navbar-nav ml-auto">
                    <button class="btn btn-lg btn-outline-dark mr-1 my-2 my-sm-0 px-3" id="help-button"><i class="bi bi-question-circle"></i> </button>
                    <button class="btn btn-lg btn-outline-dark mr-1 my-2 my-sm-0 px-3" id="about-button"><i class="bi bi-info-circle"></i></button>
                </div>
            </div>
        </nav>
          
        <div class="container-fluid">
            <div class="row py-3">
                <div class="col-4">
                    <div id="score-board" class="score-board-card mb-2">
                        <div class="row no-gutters score-cards-row">
                            <div class="col-6 pr-1">
                                <div class="score-box score-box-computer text-center">
                                    <div class="score-label"> Computer </div>
                                    <label id="score-computer" class="score-value score-value-computer">0</label>
                                </div>
                            </div>
                            <div class="col-6 pl-1">
                                <div class="score-box score-box-player text-center">
                                    <div class="score-label"> Player </div>
                                    <label id="score-player" class="score-value score-value-player">0</label>
                                </div>
                            </div>
                        </div>

                        <div class="row no-gutters score-actions-row">
                            <div class="col-6 pr-1">
                                <button id='start' class="btn btn-block btn-success score-action-button">Start</button>
                            </div>
                            <div class="col-6 pl-1">
                                <button id='stop' class="btn btn-block btn-danger score-action-button">Stop</button>
                            </div>
                        </div>
                    </div>
                    
                    <img id="computer-token" src="images/blank.svg" alt="Computer token">
                </div>

                <div class="col-8">
                    <canvas id="canvas"></canvas>
                    <video id="webcam" autoplay hidden="true"></video>
                </div> 
            </div>
        </div>

        <div class="container-fluid pt-1" id="footer">
            <div class="row py-1">
                <div id="footer-1" class="col-md-6">
                    <label class="h6 m-0">
                        <a href="legal/terms-and-conditions.html">Terms & Conditions</a> |
                        <a href="legal/privacy-policy.html"> Privacy Policy </a>
                    </label>
                </div>
                <div id="footer-2" class="col-md-6 text-right">
                    <label class="h6 m-0">Copyright © 2022 InputBlackBoxOutput</label>
                </div>
            </div>
        </div>

    <!--Generic modal-->
    <button id="show-modal" hidden="true" data-toggle="modal" data-target="#generic-modal"></button>
    
    <div class="modal fade" id="generic-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content pb-2">
                <div class="modal-header">
                    <label class="modal-title h4">Modal title</label>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    Modal content
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.1/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.1/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.2/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.1/hands.js" crossorigin="anonymous"></script>
    
    <script type="text/javascript" src="https://chancejs.com/chance.min.js"></script>
    <script type="text/javascript" src="scripts/script.js"></script>
    <script type="text/javascript" src="scripts/rfc.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
